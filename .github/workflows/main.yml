name: Main CI
on: push
  #push:
  # branches:
  #   - main
#pull_request:
#  types: [ opened, synchronize, reopened ]

# only one job should run at a time when deploying
concurrency:
  group: ${{github.workflow}}-${{ github.ref_name != 'main' && !contains(github.event.head_commit.message, '[pulumi up]') && github.ref_name || 'deploying' }}
  cancel-in-progress: false

jobs:
  ## Echo the group name to see if the concurrency is working
  #echo-group:
  #  runs-on: ubuntu-latest
  #  steps:
  #    - name: Echo group name
  #      run: echo ${{github.workflow}}-${{ github.ref_name != 'main' && !contains(github.event.head_commit.message, '[pulumi up]') && github.ref_name || 'deploying' }}
  frontend-ci:
    uses: ./.github/workflows/frontend-ci.yml
    secrets: inherit
    with:
      # only upload artifacts if
      #  a) event is push
      #    -> to main
      #    -> with a commit message containing '[pulumi up]'
      #    -> a tag
      #  b) a release has been created.

      upload-artifacts: ${{( github.event_name == 'push' && ( github.ref == 'refs/heads/main' || contains(github.event.head_commit.message, '[pulumi up]') || startsWith(github.ref, 'refs/tags/'))) || (github.event_name == 'release' && startsWith(github.ref, 'refs/tags/')) }}

  backend-ci:
    uses: ./.github/workflows/backend-ci.yml
    secrets: inherit
    with:
      # only upload artifacts if:
      #  a) event is push
      #    -> to main
      #    -> with a commit message containing '[pulumi up]'
      #    -> a tag
      #  b) a release has been created.

      upload-artifacts: ${{ github.event_name == 'push' && (( github.ref == 'refs/heads/main' || contains(github.event.head_commit.message, '[pulumi up]') || startsWith(github.ref, 'refs/tags/')) || github.event_name == 'release' && startsWith(github.ref, 'refs/tags/')) }}

  deploy:
    needs: [ frontend-ci, backend-ci ]
    # only deploy if:
    #  a) event is push
    #    -> to main
    #    -> with a commit message containing '[pulumi up]'
    #    -> a tag
    #  b) a release has been created.

    if: ${{ github.event_name == 'push' && (( github.ref == 'refs/heads/main' || contains(github.event.head_commit.message, '[pulumi up]') || startsWith(github.ref, 'refs/tags/')) || github.event_name == 'release' && startsWith(github.ref, 'refs/tags/')) }}
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      # if the event is a release, the env-type is testing environment, otherwise it is dev environment.
      env-type: ${{ startsWith(github.ref, 'refs/tags/') && 'test' || 'dev'  }}
      artifacts-version: ${{ github.ref_name }}.${{ github.sha }}
